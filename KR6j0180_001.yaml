body:
  text: 周宇文氏天竺三藏闍那耶舍譯如是我聞一時佛住難陀跋難陀龍王宮於摩尼德大雲輪藏寶樓閣中與大比丘及大菩薩并諸大龍一切衆等其名曰難陀龍王優鉢難陀龍王娑伽羅龍王阿那婆達多龍王摩那斯龍王婆留拏龍王德叉迦龍王提頭賴吒龍王婆蘇吉龍王目真鄰陀龍王伊羅跋槃拏龍王褒茶龍王德威龍王德賢龍王電鬘龍王大髻龍王珠髻龍王光曜尸棄龍王因陀羅劍戟鋒刃龍王因陀羅幢龍王因陀羅杖龍王閻浮金幢龍王安隱龍王大輪龍王大蟒龍王火味龍王月威龍王尸利摩多闍龍王易見龍王大易見龍王善住龍王寶頸龍王雲中生龍王持雨龍王奮迅龍王左右奮迅龍王奮迅壞上龍王摩訶頻拏龍王大項龍王深聲龍王大聲龍王毗那利地帝龍王優鉢羅龍王大行龍王大雨龍王質多囉斯那龍王大羂索龍王伊羅鉢多羅龍王先慰問訊龍王驢耳龍王海貝龍王達馱囉龍王優波達馱囉龍王大安隱龍王匍匐龍王大匍匐龍王大力龍王休樓茶龍王阿波羅邏龍王藍浮犁龍王吉利寐世龍王黑色龍王因陀羅軍龍王那茶龍王優波那茶龍王甘浮紇利那龍王跋陀羅毗利那遮龍王最端正龍王象掖龍王利劍龍王黃色龍王電耀龍王大電光龍王天力龍王甘婆羅龍王婆羅掣龍王甘露龍王低利他翅那龍王毗琉璃光龍王金色髮龍王金光龍王月幢光龍王日光龍王優陀延那龍王牛頭龍王白色龍王黑色龍王閻摩龍王沙蔓禰龍王蝦蟇龍王僧呵茶龍王尼民陀羅龍王持地龍王千頭龍王寶髻龍王不空見龍王雲龍王蘇屣那龍王多牛龍王人德龍王毗尼多龍王闍羅耶龍王金毗羅龍王金毗羅口龍王毗那陀羅龍王阿尸毗師那龍王蓮華龍王長尾龍王鉢羅藍毗那龍王怖畏龍王善威德龍王五頭龍王婆梨龍王闍羅陀那龍王上尾龍王大頭龍王賓畢雞龍王毗茶龍王馬龍王三頭龍王龍軍龍王大威德龍王那羅達低龍王毗摩雞龍王照曜光龍王七頭龍王大樹龍王善愛見龍王大惡龍王離垢威德龍王善見龍王摩訶瞿利那龍王焰聚龍王大旃陀龍王大瞋忿龍王寶雲龍王大雲施水龍王因陀羅光龍王樹龍王雲月龍王海雲龍王大香鳩牟陀龍王鳩牟陀獷龍王寶眼龍王大雞鬪幢龍王大雲藏龍王雪山龍王德藏龍王雲槊龍王何囉闍鎮達犁龍王雲龍王大雲出水龍王大雲大出水龍王大火威德龍王大雲富龍王離嗔怒龍王鳩鳩婆龍王勇壯龍王水池龍王雲蓋龍王因祇囉口龍王威德龍王出雲龍王無量行龍王蘇出那龍王大身龍王大腹龍王吉龍王壯龍王烏眼龍王優突羅龍王毗疏其梨那龍王妙聲龍王甘露牢固注大雨龍王毗求休尼低龍王相擊出聲龍王妙鼓聲龍王甘露連注龍王歡喜龍王震雷音龍王勇健將龍王那羅延龍王婆茶婆目佉龍王毗迦吒龍王如是等一切大龍王而為上首與八十四億百千那由他龍王俱在會坐爾時彼諸龍王并其眷屬從坐而起偏袒右肩右膝著地合掌向佛以無量阿僧祇種種殊勝上妙香華塗香末香燒香及諸華鬘種種衣服幢幡繒綵音樂歌詠寶花寶帳雜珮旒蘇垂諸瓔珞龍華珠網廣設供具以大堅固尊重恭敬不可思議上勝清淨淳厚信心供養如來作是供養右繞佛己於一面住同時舉聲發大誓願願以一切世界微塵一一微塵廣大如海我等身海諸佛菩薩道場衆海一切世界不可數海一切四大地水火風微塵等海一切色光如微塵等一一塵中過算數海無量阿僧祇不可數不可思量不可稱説過説身海一一身中以無量手其不可數猶如海雲化出種種諸供養具普十方面一一微塵不斷不散亦如海雲又願一切諸佛及菩薩海我等常當在在處處作諸供養所有無量阿僧祇不可思量不可稱説不斷不散一切十方皆如普賢菩薩行身海雲十方虛空悉皆普覆心願力故成就菩薩之身亦如海雲爾時一切寶色光焰不斷不散一切日月身輪海雲一切寶帳旒蘇衆花海雲一切寶帳大光明藏樓閣海雲一切樹枝篋藏海雲一切香色示現海雲一切言語妙聲種種音樂海雲一切香樹海雲充滿虛空威神建立如是等無量阿僧祇不可思量不可稱説不散不斷海雲供養一切諸佛及菩薩海盡未來際恭敬尊重禮拜供給如是供養一切大莊嚴境界摩尼王藏猶如電光海雲充滿虛空威神建立又願一切諸佛及菩薩海盡未來際恭敬尊重禮拜供給如是供養一切普照寶雨莊嚴摩尼王海雲一切寶焰照明佛化音響常不休息摩尼王海雲普樂一切佛法音響摩尼王海雲普十方面示現寶焰諸佛化光海雲一切莊嚴不壞不散皆悉影現摩尼王焰燈海雲一切諸佛境界隨順摩尼王海雲不可思議諸佛剎土諸如來處皆悉影現摩尼王海雲如是等我皆供養一切種種寶塵三世佛身及影毗盧遮那摩尼王海雲充滿虛空威神建立示現訖已於一切佛菩薩海雲猶如大海盡未來際我恭敬尊重禮拜供給如是供養不散不斷又願一切寶香衆花樓閣海雲無量色寶一切摩尼王莊嚴樓閣海雲寶燈香焰樓閣海雲一切真珠種種樓閣海雲一切華鬘海雲無量衆寶莊嚴瓔珮旒蘇樓閣海雲充滿虛空如是建立已十方無量普焰火藏一切莊嚴和合化成樓閣海雲一切寶笛寶輪示現無量莊嚴十方樓閣海雲一切莊嚴雕飾普遍樓閣海雲普十方門飛樓欄楯鈴網帳帷海雲充滿虛空威神建立皆悉示現於一切佛及菩薩海盡未來際恭敬尊重禮拜供給如是供養又願以吐金寶雜縷瓔珞寶歡喜藏師子座海雲花光雜藏師子座海雲因陀尼羅閻浮那池蓮華雜藏師子座海雲摩尼燈蓮華藏師子座海雲焰幢摩尼蓮華雜藏師子座海雲寶飾蓮華雜藏師子座海雲因陀羅青色妙麗光焰蓮華藏師子座海雲無盡光焰照耀威勢蓮華藏師子座海雲一切蓮華藏出諸寶焰師子